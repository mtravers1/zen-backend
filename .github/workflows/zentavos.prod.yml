name: zentavos-api-prod

on:
  push:
    branches: [ prod ]
  pull_request:
    branches: [ prod ]
  workflow_dispatch:

env:
  DEPLOYMENT_NAME: prod
  APP_PORT: 3003

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod'
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: npm ci
      - name: Build backend
        run: npm run build
      - name: Replace environment variables
        run: |
          cd dist
          sed -i -e "s|DEPLOYMENT_ENV\=.*|DEPLOYMENT_ENV\=$DEPLOYMENT_NAME|g" scripts/start_server.sh
          sed -i -e "s|MONGODB_URI\=.*|MONGODB_URI\=\'mongodb\:\/\/${{ secrets.MONGODB_URI_QA }}\:27017\'|g" .env.sample
          sed -i -e "s|MONGODB_DB\=.*|MONGODB_DB\=\'zentavos_$DEPLOYMENT_NAME\'|g" .env.sample
          sed -i -e "s|APP_PORT\=.*|APP_PORT\=$APP_PORT|g" .env.sample
          sed -i -e "s|FIREBASE_SERVICE_ACCOUNT_PATH\=.*|FIREBASE_SERVICE_ACCOUNT_PATH\=./ServiceAccountKey.json|g" .env.sample
          sed -i -e "s|PLAID_CLIENT_ID\=.*|PLAID_CLIENT_ID\=${{ secrets.PLAID_CLIENT_ID_DEV }}|g" .env.sample
          sed -i -e "s|PLAID_SECRET\=.*|PLAID_SECRET\=${{ secrets.PLAID_SECRET_DEV }}|g" .env.sample
          sed -i -e "s|PLAID_WEBHOOK_URL\=.*|PLAID_WEBHOOK_URL\=${{ secrets.PLAID_WEBHOOK_URL_UAT }}|g" .env.sample
          sed -i -e "/\"type\"\:.*/d" package.json
          cp .env.sample .env
          cd ..
      - name: rsync deployment
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --include ".env"
          path: ./dist/*
          remote_path: ${{ secrets.EC2_DEPLOYMENT_PATH }}/${{ env.DEPLOYMENT_NAME }}
          remote_host: ${{ secrets.EC2_SSH_HOST }}
          remote_user: ${{ secrets.EC2_SSH_USER }}
          remote_key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      - name: SSH config
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem # Write the private key to a file
          chmod 600 private_key.pem # Set the appropriate permissions for the key file
      - name: Restart API service
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no ./dist/.env ${{ secrets.EC2_SSH_USER }}@${{ secrets.EC2_SSH_HOST }}:${{ secrets.EC2_DEPLOYMENT_PATH }}/${{ env.DEPLOYMENT_NAME }}
          ssh -i private_key.pem ${{ secrets.EC2_SSH_USER }}@${{ secrets.EC2_SSH_HOST }} -o StrictHostKeyChecking=no <<EOF
            source ~/.nvm/nvm.sh
            cd ${{ secrets.EC2_DEPLOYMENT_PATH }}/${{ env.DEPLOYMENT_NAME }}
            chmod +x scripts/start_server.sh
            ./scripts/start_server.sh
          EOF
          rm -f private_key.pem # Remove the private key file after use for security
