name: zentavos-api-stg

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

env:
  DEPLOYMENT_NAME: staging
  BUNDLE_ID: com.zentavos.zentavosuat
  APP_PORT: 3002

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Install OpenVPN
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: openvpn openvpn-systemd-resolved rsync
          version: 1.0
      - name: Check out repository code
        uses: actions/checkout@v2
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ztv-build-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ztv-build-
            ztv-
      - name: Install dependencies
        run: npm ci
      - name: Build backend
        run: npm run build
      - name: Install Production Dependencies in /dist
        run: |
          cd dist
          npm install --production --omit=dev
      - name: Replace environment variables
        run: |
          cd dist
          cp .env.sample .env
          sed -i -e "s|MONGODB_URI\=.*|MONGODB_URI\=\'mongodb\:\/\/${{ secrets.MONGODB_URI_STG }}\'|g" .env
          sed -i -e "s|MONGODB_USER\=.*|MONGODB_USER\=\'${{ secrets.MONGODB_USER_STG }}\'|g" .env
          sed -i -e "s|MONGODB_PASS\=.*|MONGODB_PASS\=\'${{ secrets.MONGODB_PASS_STG }}\'|g" .env
          sed -i -e "s|MONGODB_DB\=.*|MONGODB_DB\=\'${{ secrets.MONGODB_DB_STG }}\'|g" .env
          sed -i -e "s|APP_PORT\=.*|APP_PORT\=$APP_PORT|g" .env
          sed -i -e "s|FIREBASE_SERVICE_ACCOUNT_PATH\=.*|FIREBASE_SERVICE_ACCOUNT_PATH\=./ServiceAccountKey.json|g" .env
          sed -i -e "s|PLAID_CLIENT_ID\=.*|PLAID_CLIENT_ID\=${{ secrets.PLAID_CLIENT_ID_STG }}|g" .env
          sed -i -e "s|PLAID_SECRET\=.*|PLAID_SECRET\=${{ secrets.PLAID_SECRET_STG }}|g" .env
          sed -i -e "s|PLAID_WEBHOOK_URL\=.*|PLAID_WEBHOOK_URL\=${{ secrets.PLAID_WEBHOOK_URL_STG }}|g" .env
          sed -i -e "s|PLAID_ENV\=.*|PLAID_ENV\=staging|g" .env
          # --- GCP/KMS/Encryption Variables ---
          sed -i -e "s|GCP_PROJECT_ID\=.*|GCP_PROJECT_ID\=${{ vars.GCP_PROJECT_ID_STG }}|g" .env
          sed -i -e "s|GCS_DEK_BUCKET_NAME\=.*|GCS_DEK_BUCKET_NAME\=${{ vars.GCS_DEK_BUCKET_NAME_STG }}|g" .env
          sed -i -e "s|GCS_FILES_BUCKET_NAME\=.*|GCS_FILES_BUCKET_NAME\=${{ vars.GCS_FILES_BUCKET_NAME_STG }}|g" .env
          sed -i -e "s|LEGACY_GCS_BUCKET_NAME\=.*|LEGACY_GCS_BUCKET_NAME\=${{ vars.LEGACY_GCS_BUCKET_NAME_STG }}|g" .env
          sed -i -e "s|LEGACY_GCS_ENVIRONMENT_FOLDER\=.*|LEGACY_GCS_ENVIRONMENT_FOLDER\=${{ vars.LEGACY_GCS_ENVIRONMENT_FOLDER_STG }}|g" .env
          sed -i -e "s|GCP_KEY_LOCATION\=.*|GCP_KEY_LOCATION\=${{ vars.GCP_KEY_LOCATION_STG }}|g" .env
          sed -i -e "s|GCP_KEY_RING\=.*|GCP_KEY_RING\=${{ vars.GCP_KEY_RING_STG }}|g" .env
          sed -i -e "s|GCP_KEY_NAME\=.*|GCP_KEY_NAME\=${{ vars.GCP_KEY_NAME_STG }}|g" .env
          sed -i -e "s|LEGACY_GCP_PROJECT_ID\=.*|LEGACY_GCP_PROJECT_ID\=${{ vars.LEGACY_GCP_PROJECT_ID }}|g" .env
          sed -i -e "s|LEGACY_GCP_KEY_LOCATION\=.*|LEGACY_GCP_KEY_LOCATION\=${{ vars.LEGACY_GCP_KEY_LOCATION }}|g" .env
          sed -i -e "s|LEGACY_GCP_KEY_RING\=.*|LEGACY_GCP_KEY_RING\=${{ vars.LEGACY_GCP_KEY_RING }}|g" .env
          sed -i -e "s|LEGACY_GCP_KEY_NAME\=.*|LEGACY_GCP_KEY_NAME\=${{ vars.LEGACY_GCP_KEY_NAME }}|g" .env
          sed -i -e "s|HASH_SALT\=.*|HASH_SALT\=${{ secrets.HASH_SALT_STG }}|g" .env
          sed -i -e "s|STORAGE_SERVICE_ACCOUNT\=.*|STORAGE_SERVICE_ACCOUNT\=${{ secrets.STORAGE_SERVICE_ACCOUNT_STG }}|g" .env
          sed -i -e "s|KMS_SERVICE_ACCOUNT\=.*|KMS_SERVICE_ACCOUNT\=${{ secrets.KMS_SERVICE_ACCOUNT_STG }}|g" .env
          # --- End GCP/KMS/Encryption Variables ---
          sed -i -e "s|AI_URL\=.*|AI_URL\=${{ secrets.AI_URL }}|g" .env
          sed -i -e "s|AI_MODEL\=.*|AI_MODEL\=${{ vars.AI_MODEL }}|g" .env
          sed -i -e "s|PLAID_REDIRECT_URI\=.*|PLAID_REDIRECT_URI\=${{ secrets.PLAID_REDIRECT_URI_STG }}|g" .env
          sed -i -e "s|PLAID_REDIRECT_URI_NEW_ACCOUNTS\=.*|PLAID_REDIRECT_URI_NEW_ACCOUNTS\=${{ secrets.PLAID_REDIRECT_URI_NEW_ACCOUNTS_STG }}|g" .env
          sed -i -e "s|GROQ_AI_MODEL\=.*|GROQ_AI_MODEL\=${{ vars.GROQ_AI_MODEL }}|g" .env
          sed -i -e "s|GROQ_API_KEY\=.*|GROQ_API_KEY\=${{ secrets.GROQ_API_KEY }}|g" .env
          sed -i -e "s|IAP_CERTIFICATE\=.*|IAP_CERTIFICATE\=${{ secrets.IAP_CERTIFICATE_STG }}|g" .env
          sed -i -e "s|ISSUER_ID\=.*|ISSUER_ID\=${{ secrets.ISSUER_ID_STG }}|g" .env
          sed -i -e "s|KEY_ID\=.*|KEY_ID\=${{ secrets.KEY_ID_STG }}|g" .env
          sed -i -e "s|APPLE_SHARED_SECRET\=.*|APPLE_SHARED_SECRET\=${{ secrets.APPLE_SHARED_SECRET_STG }}|g" .env
          sed -i -e "s|APPLE_SANDBOX_EMAIL\=.*|APPLE_SANDBOX_EMAIL\=${{ secrets.APPLE_SANDBOX_EMAIL_STG }}|g" .env
          sed -i -e "s|APPLE_SANDBOX_PASSWORD\=.*|APPLE_SANDBOX_PASSWORD\=${{ secrets.APPLE_SANDBOX_PASSWORD_STG }}|g" .env
          sed -i -e "s|APPLE_CLIENT_ID\=.*|APPLE_CLIENT_ID\=${{ secrets.APPLE_CLIENT_ID_STG }}|g" .env
          sed -i -e "s|FIREBASE_SERVICE_ACCOUNT\=.*|FIREBASE_SERVICE_ACCOUNT\=${{ secrets.FIREBASE_SERVICE_ACCOUNT_STG }}|g" .env
          sed -i -e "s|FIREBASE_API_KEY\=.*|FIREBASE_API_KEY\=${{ secrets.FIREBASE_API_KEY_STG }}|g" .env
          sed -i -e "s|GOOGLE_CLIENT_ID\=.*|GOOGLE_CLIENT_ID\=${{ secrets.GOOGLE_CLIENT_ID_STG }}|g" .env
          sed -i -e "s|GOOGLE_PLAY_SERVICE_ACCOUNT\=.*|GOOGLE_PLAY_SERVICE_ACCOUNT\=${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}|g" .env
          sed -i -e "s|BUNDLEID\=.*|BUNDLEID\=$BUNDLE_ID|g" .env
          sed -i -e "s|ENVIRONMENT\=.*|ENVIRONMENT\=$DEPLOYMENT_NAME|g" .env
          sed -i -e "s|USER_ENCRYPTION_KEY_BUCKET_NAME\=.*|USER_ENCRYPTION_KEY_BUCKET_NAME\=${{ vars.USER_ENCRYPTION_KEY_BUCKET_NAME_STG }}|g" .env
          cd ..
      - name: Debug GCP/KMS Variables
        run: |
          echo "GCP_PROJECT_ID_STG: ${{ vars.GCP_PROJECT_ID_STG }}"
          echo "GCS_BUCKET_NAME_STG: ${{ vars.GCS_BUCKET_NAME_STG }}"
          echo "LEGACY_GCS_BUCKET_NAME_STG: ${{ vars.LEGACY_GCS_BUCKET_NAME_STG }}"
          echo "LEGACY_GCS_ENVIRONMENT_FOLDER_STG: ${{ vars.LEGACY_GCS_ENVIRONMENT_FOLDER_STG }}"
          echo "GCP_KEY_LOCATION_STG: ${{ vars.GCP_KEY_LOCATION_STG }}"
          echo "GCP_KEY_RING_STG: ${{ vars.GCP_KEY_RING_STG }}"
          echo "GCP_KEY_NAME_STG: ${{ vars.GCP_KEY_NAME_STG }}"
          echo "HASH_SALT_STG: ${{ secrets.HASH_SALT_STG }}"
          echo "STORAGE_SERVICE_ACCOUNT_STG: ${{ secrets.STORAGE_SERVICE_ACCOUNT_STG }}"
          echo "KMS_SERVICE_ACCOUNT_STG: ${{ secrets.KMS_SERVICE_ACCOUNT_STG }}"
          echo "FIREBASE_SERVICE_ACCOUNT_STG: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STG }}"
          echo "FIREBASE_API_KEY_STG: ${{ secrets.FIREBASE_API_KEY_STG }}"
          echo "GOOGLE_CLIENT_ID_STG: ${{ secrets.GOOGLE_CLIENT_ID_STG }}"
      - name: Create ServiceAccountKey.json
        uses: actions/github-script@v6
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.STORAGE_SERVICE_ACCOUNT_STG }}
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('dist/ServiceAccountKey.json', process.env.SERVICE_ACCOUNT_KEY);
      - name: VPN config
        env:
          OVPN_CONFIG: ${{ secrets.OVPN_CONFIG }}
        run: |
          echo "$OVPN_CONFIG" > client.ovpn
      - name: Connect to VPN
        uses: kota65535/github-openvpn-connect-action@v3.1.0
        with:
          config_file: client.ovpn
          echo_config: false
          username: ${{ secrets.OVPN_USERNAME }}
          password: ${{ secrets.OVPN_PASSWORD }}
      - name: rsync deployment
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --no-times --omit-dir-times --no-perms --no-owner --no-group --chmod=D755,F664
          path: ./dist/
          remote_path: ${{ vars.DEPLOYMENT_PATH }}
          remote_host: ${{ vars.DEPLOYMENT_HOST_STG }}
          remote_user: ${{ secrets.DEPLOYMENT_USER_STG }}
          remote_key: ${{ secrets.DEPLOYMENT_KEY_STG }}
          remote_port: ${{ secrets.DEPLOYMENT_PORT }}
      - name: SSH config
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYMENT_KEY_STG }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem # Write the private key to a file
          chmod 600 private_key.pem # Set the appropriate permissions for the key file
      - name: Restart API service
        run: |
          ssh -i private_key.pem ${{ secrets.DEPLOYMENT_USER_STG }}@${{ vars.DEPLOYMENT_HOST_STG }} -p ${{ secrets.DEPLOYMENT_PORT }} -o StrictHostKeyChecking=no <<EOF
            export NODE_ENV=staging &&
            export DEPLOYMENT_ENV=${{ env.DEPLOYMENT_NAME }} &&
            cd ${{ vars.DEPLOYMENT_PATH }}
            chmod +x scripts/start_server.sh
            bash ./scripts/start_server.sh
            echo "--- Displaying api-out.log and aip-error.log ---"
            timeout 120 tail -f /var/log/zentavos/api-out.log /var/log/zentavos/api-error.log
          EOF
          rm -f private_key.pem # Remove the private key file after use for security
          rm -f client.ovpn # Remove ovpn file after use for security
