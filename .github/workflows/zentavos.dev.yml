name: zentavos-api-dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - run: npm ci
      - run: npm run build
      - name: rsync deployments
        uses: burnett01/rsync-deployments@5.1
        with:
          switches: -avzr --delete
          path: ./dist/*
          remote_path: /home/ubuntu/dev
          remote_host: ec2-54-159-117-145.compute-1.amazonaws.com
          remote_user: "${{ secrets.EC2_SSH_USER }}"
          remote_key: "${{ secrets.EC2_SSH_PRIVATE_KEY }}"