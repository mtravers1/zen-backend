name: zentavos-api-dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: npm ci
      - name: Build backend
        run: npm run build      
      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --include=".env.sample" 
          path: ./dist/*
          remote_path: "${{ secrets.EC2_DEPLOYMENT_PATH }}/dev"
          remote_host: "${{ secrets.EC2_SSH_HOST }}"
          remote_user: "${{ secrets.EC2_SSH_USER }}"
          remote_key: "${{ secrets.EC2_SSH_PRIVATE_KEY }}"
          rsh: |
            cd "${{ secrets.EC2_DEPLOYMENT_PATH }}"/dev
            chmod +x ./scripts/start_server.sh
            ./scripts/start_server.sh
